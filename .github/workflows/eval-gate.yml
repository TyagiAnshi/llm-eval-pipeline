name: LLM Eval CI/CD Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Typecheck, lint, test, build, and enforce eval SLA gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (frontend + backend)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Run LLM eval quality gate
        id: eval_gate
        run: npm run eval -- --model=claude-3-5-sonnet --author="${{ github.actor }}" --commit="${{ github.sha }}" --message="${{ github.event.head_commit.message || github.event.pull_request.title || 'CI run' }}" | tee eval-output.log
        continue-on-error: true

      - name: Surface eval gate result as a PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('eval-output.log', 'utf8');
            const gatePassed = '${{ steps.eval_gate.outcome }}' === 'success';
            const body = [
              `### ${gatePassed ? '✅ LLM Eval Quality Gate Passed' : '🚨 LLM Eval Quality Gate FAILED'}`,
              '',
              '```',
              output.slice(-4000),
              '```'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail the job if the quality gate was breached
        if: steps.eval_gate.outcome != 'success'
        run: |
          echo "::error::LLM Eval SLA gate failed (hallucination rate, faithfulness, or p95 latency breached). Merge blocked."
          exit 1
